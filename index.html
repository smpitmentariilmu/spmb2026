<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPMB</title>

  <link rel="icon" href="https://mentariilmu.org/logo.png">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:Arial, sans-serif;
    }

    #loader{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#fff;
      z-index:9999;
      color:#184c47;
      font-size:18px;
      font-weight:600;
    }

    iframe{
      width:100%;
      height:100vh;
      border:none;
    }
  </style>
</head>
<body>

<div id="loader">
  Memuat Formulir SPMB...
</div>

<iframe
  id="formFrame"
  src="https://docs.google.com/forms/d/e/1FAIpQLScNQAc6w9FlcmWagivW1zYSEwUlYQszXr5K_xoeyHIdiK1cUA/viewform?embedded=true"
  loading="lazy"
  allowfullscreen>
</iframe>

<script>
  const frame = document.getElementById('formFrame');
  const loader = document.getElementById('loader');

  frame.onload = () => {
    loader.style.display = 'none';
  };

  // Fallback jika event load tidak terdeteksi
  setTimeout(() => {
    loader.style.display = 'none';
  }, 3000);
</script>

</body>
</html>
